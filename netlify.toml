  [build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/forum"
  to = "/forum/index.html"
  status = 200

[[redirects]]
  from = "/forum/*"
  to = "/forum/index.html"
  status = 200
