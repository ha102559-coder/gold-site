<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirect</title>
<script>
  const saved = localStorage.getItem('lang');
  const browserLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
  const lang = saved || browserLang;
  location.replace('/' + lang + '/');
</script>
</head>
<body></body>
</html>
